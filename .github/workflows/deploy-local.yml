name: Local Deployment Simulation

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Build Backend
      run: ./gradlew build -x test
      working-directory: ./backend

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Build Frontend
      run: |
        npm install
        npm run build
      working-directory: ./frontend

    - name: Simulate Deployment
      run: |
        echo "🚀 Deploying to Local Environment..."
        echo "Checking Backend Health: http://localhost:8080/api/health"
        echo "Checking Frontend: http://localhost:3000"
        echo "Syncing Flyway Migrations..."
        ./gradlew flywayInfo
        echo "✅ Deployment Successful!"
      working-directory: ./backend
